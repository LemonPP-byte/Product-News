title: Product News Daily
description: AI-curated daily digest of consumer products and market trends
baseurl: "/Product-News" # the subpath of your site, e.g. /blog
url: "https://lemonpp-byte.github.io" # the base hostname & protocol for your site, e.g. http://example.com

# Build settings
markdown: kramdown
future: true # Allow future posts to be published
exclude:
  - ".github"
  - "node_modules"

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "default"
